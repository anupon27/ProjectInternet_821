version: '3.8'

services:

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: LoveMySQL
      MYSQL_DATABASE: webdb
    ports:
      - "8821:3306"
    volumes:
      - "mysql_Data_Project:/var/lib/mysql"
    networks:
      - ProjectInternet
    restart: always

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpProjectInternet
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: LoveMySQL
      UPLOAD_LIMIT: 68M
    ports:
      - "8822:80"
    depends_on:
      - db
    networks:
      - ProjectInternet
    restart: always

networks:
  ProjectInternet:
    driver: bridge

volumes:
  mysql_Data_Project:
    driver: local
