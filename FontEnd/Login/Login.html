<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta kw="Internet">
  <meta author="Natthaphat & Anuphon">
  <meta name="viewport" content="width=device-width, initial-scale=1.1">
  <title>Login</title>
  <link rel="stylesheet" href="Login.css">


</head>

<body>

  <div class="container">
    <div class="image-side"></div>

    <div class="form-side">
      <div class="btn-box">
        <button class="toggle-btn active" onclick="showLogin()">เข้าสู่ระบบ</button>
        <button class="toggle-btn" onclick="showRegister()">สมัครสมาชิก</button>
      </div>

      <div class="form-box">
        <form id="loginForm" class="active">
          <h2>เข้าสู่ระบบ</h2>
            <input type="text" id="loginUser" placeholder="ชื่อผู้ใช้" required>
            <span class="error-msg" id="err-loginUser"></span>
            <input type="password" id="loginPassword" placeholder="รหัสผ่าน" required>
            <span class="error-msg" id="err-loginPassword"></span>
            <input type="button" value="เข้าสู่ระบบ" onclick="handleLogin()">
        </form>

        <form id="registerForm">
          <h2>สมัครสมาชิก</h2>
          <input type="text" id="regFirstname" placeholder="ชื่อจริง">
          <span class="error-msg" id="err-regFirstname"></span>
          <input type="text" id="regLastname" placeholder="นามสกุล">
          <span class="error-msg" id="err-regLastname"></span>
          <input type="email" id="regEmail" placeholder="อีเมล">
          <span class="error-msg" id="err-regEmail"></span>
          <input type="text" id="regUsername" placeholder="ชื่อผู้ใช้">
          <span class="error-msg" id="err-regUsername"></span>
          <input type="number" id="regAGE" placeholder="อายุ">
          <span class="error-msg" id="err-regAGE"></span>
          <input type="password" id="regPassword" placeholder="รหัสผ่าน">
          <span class="error-msg" id="err-regPassword"></span>
          <input type="button" value="สมัครสมาชิก" onclick="handleRegister()">
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
  <script src="Login.js"></script>
</body>

</html>
